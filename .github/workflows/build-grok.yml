name: Build Wemos Android APK

on:
  push:
    branches: [main, android-apk-build]
  pull_request:
    branches: [main, android-apk-build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install Node & Cordova
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g cordova@12.0.0

      - name: Clean
        run: |
          rm -rf platforms/android || true
          cordova clean android || true

      - name: Install Deps
        run: npm ci

      - name: Add Platform & Plugins
        run: |
          cordova platform add android@12.0.0
          cordova plugin add cordova-plugin-device cordova-plugin-splashscreen cordova-plugin-ionic-webview cordova-plugin-ionic-keyboard cordova-plugin-wakeuplocalnotification cordova-plugin-local-notification cordova-plugin-background-mode cordova-plugin-network-information cordova-plugin-app-version

      - name: Copy Custom Files
        run: |
          mkdir -p platforms/android/app/src/main/java/com/wemos/notification platforms/android/app/src/main/res/xml platforms/android/app/src/main/res/values
          cp attachments/AndroidManifest.xml platforms/android/app/src/main/AndroidManifest.xml
          cp attachments/*.java platforms/android/app/src/main/java/com/wemos/notification/
          cp attachments/network_security_config.xml platforms/android/app/src/main/res/xml/
          cp attachments/styles.xml platforms/android/app/src/main/res/values/
          cp attachments/strings.xml platforms/android/app/src/main/res/values/

      - name: Prepare & Build Debug
        run: |
          cordova prepare android
          cordova build android --debug

      - name: Build Release
        run: cordova build android --release
        continue-on-error: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-apks
          path: platforms/android/app/build/outputs/apk/**/*.apk
          retention-days: 30